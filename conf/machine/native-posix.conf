#@TYPE: Machine
#@NAME: native-posix
#@DESCRIPTION: Zephyr native_posix board - compiles as Linux executable for testing
# Zephyr native_posix uses the host compiler directly. Set minimal
# tune to satisfy OE sanity checker.

DEFAULTTUNE = "x86-64"
require conf/machine/include/x86/arch-x86.inc
TUNE_FEATURES:tune-x86-64 = "m64"

# native_posix builds a Linux executable that needs POSIX APIs (pty.h,
# pthread.h). Override newlib from zephyr distro with glibc.
TCLIBC = "glibc"

# ARCH=posix is for Zephyr cmake only. Don't set it globally or it
# leaks into linux-libc-headers (which has no arch/posix/).
# The zephyr.bbclass sets ARCH from ZEPHYR_BOARD via python.
