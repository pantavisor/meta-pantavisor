TMPDIR = "${TOPDIR}/tmp-${DISTRO_CODENAME}-rpi-kernel-${MACHINE}"
MACHINE = "raspberrypi-armv8"
INITRAMFS_IMAGE = ""
RPI_USE_U_BOOT = "0"
