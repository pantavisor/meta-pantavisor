# Every file needs to contain a header, that provides kas with information
# about the context of this file.
header:
  # The `version` entry in the header describes for which configuration
  # format version this file was created for. It is used by kas to figure
  # out if it is compatible with this file. The version is an integer that
  # is increased on every format change.
  version: 16
  includes:
    - kas/platforms/freescale.yaml

# The machine as it is written into the `local.conf` of bitbake.
repos:

  meta-toradex-bsp-common:
    path: layers/meta-toradex-bsp-common
    url: "https://git.toradex.com/meta-toradex-bsp-common.git"
    branch: scarthgap-7.x.y

  meta-toradex-nxp:
    path: layers/meta-toradex-nxp
    url: "https://git.toradex.com/meta-toradex-nxp.git"
    branch: scarthgap-7.x.y

  meta-toradex-tezi:
    path: layers/meta-toradex-tezi
    url: "https://github.com/toradex/meta-toradex-tezi.git"
    branch: scarthgap-7.x.y

  meta-qt5:
    path: layers/meta-qt5
    url: "https://github.com/meta-qt5/meta-qt5/"
    branch: scarthgap

local_conf_header:
  platform-toradex: |
    PV_UBOOT_AUTOFDT = "1"
  tezi-recovery-multiconfig: |
    BBMULTICONFIG:append = " tezi-recovery"
    # meta-toradex-tezi recipes outside recipes-bsp/ require DISTRO = "tezi" to
    # parse cleanly (TDX_VERSION undefined, tezirunimg IMAGE_CMD missing, Qt/Wayland
    # version pins incompatible with panta-distro). Mask them globally; the only
    # tezi artifacts we need are the u-boot and imx-boot bbappends in recipes-bsp/.
    # meta-toradex-bsp-common ships its own u-boot-distro-boot.bb which conflicts
    # with the tezi-specific 1.1 version — mask that too.
    BBMASK:append = " \
        meta-toradex-tezi/recipes-tezi/ \
        meta-toradex-tezi/recipes-graphics/ \
        meta-toradex-tezi/recipes-qt/ \
        meta-toradex-tezi/recipes-connectivity/ \
        meta-toradex-tezi/recipes-core/ \
        meta-toradex-tezi/recipes-kernel/ \
        meta-toradex-tezi/recipes-devtools/ \
        meta-toradex-tezi/recipes-support/ \
        "
