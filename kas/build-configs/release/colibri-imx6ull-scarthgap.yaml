header:
    version: 16
_source_dir: .
repos:
    meta-freescale:
        commit: 0c27c21cab57876474bb572e5d378b6707e41224
        path: layers/meta-freescale
        url: https://github.com/Freescale/meta-freescale.git
    meta-freescale-3rdparty:
        commit: ce10c065119c2d4e359235c77aae7e0d843533ef
        path: layers/meta-freescale-3rdparty
        url: https://github.com/Freescale/meta-freescale-3rdparty.git
    meta-freescale-distro:
        commit: b9d6a5d9931922558046d230c1f5f4ef6ee72345
        path: layers/meta-freescale-distro
        url: https://github.com/Freescale/meta-freescale-distro.git
    meta-toradex-bsp-common:
        branch: scarthgap-7.x.y
        commit: d24194128985c1c769446986a495f90e97e4545f
        path: layers/meta-toradex-bsp-common
        url: https://git.toradex.com/meta-toradex-bsp-common.git
    meta-toradex-nxp:
        branch: scarthgap-7.x.y
        commit: 7bbd2b25581a265a42ff04a7c66b5098e18fca2e
        path: layers/meta-toradex-nxp
        url: https://git.toradex.com/meta-toradex-nxp.git
    poky:
        patches:
            fit-image-multiconfig:
                path: patches/poky/0001-fit-image-multiconfig.scarthgap.patch
                repo: meta-pantavisor
            update-rc-initscripts:
                path: patches/poky/update-rc.patch
                repo: meta-pantavisor
        url: https://github.com/yoctoproject/poky.git
        path: layers/poky
        layers:
            meta:
            meta-poky:
        commit: b56134ff90dec996e8aae45ed7e6ad6b1d5a84a0
    meta-pantavisor:
    meta-virtualization:
        commit: 89da4f56b4c510059f8dc1527d289d9fd4fef133
        path: layers/meta-virtualization
        url: https://git.yoctoproject.org/meta-virtualization
    meta-openembedded:
        commit: d8cc4e44001c7257273d290ce8c4496e93d32841
        layers:
            meta-filesystems:
            meta-networking:
            meta-oe:
            meta-python:
        path: layers/meta-openembedded
        url: https://github.com/openembedded/meta-openembedded.git
local_conf_header:
    platform-freescale: |
        ACCEPT_FSL_EULA = "1"
    platform-toradex: |
        PV_UBOOT_AUTOFDT = "1"
    platform-colibri-imx6ull: |
        PV_FLASH_README = "docs/flashing/boards/colibri-imx6ull.md"
        PV_FLASH_README_DEPS = "docs/flashing/tezi.md"
        include conf/machine/include/colibri-imx6ull.inc
        IMAGE_CLASSES:remove = " image_type_tezi"
        IMAGE_FSTYPES:remove  = "teziimg"
        IMAGE_CLASSES:append = " image_type_pv_tezi pv-tezi-uboot"
        IMAGE_FSTYPES:append = " pv_teziimg"
    pvgo: |
        PREFERRED_VERSION_pvgo-binary-native = "1.24.13"
    rm_work: |
        INHERIT += "rm_work"
    package_management: |
        PACKAGE_CLASSES = "package_rpm"
    panta-base: |
        TMPDIR = "${TOPDIR}/tmp-${DISTRO_CODENAME}"
    pantavisor-system: |
        DISTRO_FEATURES:append = " pantavisor-system "
        PANTAVISOR_FEATURES:append = " dm-crypt"
        PANTAVISOR_FEATURES:append = " dm-verity"
        PANTAVISOR_FEATURES:append = " autogrow"
        INITRAMFS_IMAGE = "pantavisor-initramfs"
    pantavisor-runc: |
        PANTAVISOR_FEATURES:append = " runc"
    pantavisor-tailscale: |
        PANTAVISOR_FEATURES:append = " tailscale"
    pantavisor-debug: |
        PANTAVISOR_FEATURES:append = " debug"
    __menu_config_locals: ''
    __menu_config_vars: |-
        EXTRA_IMAGE_FEATURES:append = " debug-tweaks"
        INHERIT += "rm_work"
machine: colibri-imx6ull
defaults:
    repos:
        branch: scarthgap
target:
- pantavisor-starter
build_system: oe
distro: panta-distro
env:
    PVROOT_IMAGE_BSP:
    PV_BOOT_OEMARGS:
