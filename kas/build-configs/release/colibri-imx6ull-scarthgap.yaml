local_conf_header:
    platform-freescale: |
        ACCEPT_FSL_EULA = "1"
    platform-toradex: |
        PV_UBOOT_AUTOFDT = "1"
    tezi-recovery-multiconfig: "BBMULTICONFIG:append = \" tezi-recovery\"\n# meta-toradex-tezi\
        \ recipes outside recipes-bsp/ require DISTRO = \"tezi\" to\n# parse cleanly\
        \ (TDX_VERSION undefined, tezirunimg IMAGE_CMD missing, Qt/Wayland\n# version\
        \ pins incompatible with panta-distro). Mask them globally; the only\n# tezi\
        \ artifacts we need are the u-boot and imx-boot bbappends in recipes-bsp/.\n\
        # meta-toradex-bsp-common ships its own u-boot-distro-boot.bb which conflicts\n\
        # with the tezi-specific 1.1 version \u2014 mask that too.\nBBMASK:append\
        \ = \" \\\n    meta-toradex-tezi/recipes-tezi/ \\\n    meta-toradex-tezi/recipes-graphics/\
        \ \\\n    meta-toradex-tezi/recipes-qt/ \\\n    meta-toradex-tezi/recipes-connectivity/\
        \ \\\n    meta-toradex-tezi/recipes-core/ \\\n    meta-toradex-tezi/recipes-kernel/\
        \ \\\n    meta-toradex-tezi/recipes-devtools/ \\\n    meta-toradex-tezi/recipes-support/\
        \ \\\n    \"\n"
    platform-colibri-imx6ull: |
        PV_FLASH_README = "docs/flashing/boards/colibri-imx6ull.md"
        PV_FLASH_README_DEPS = "docs/flashing/tezi.md"
        include conf/machine/include/colibri-imx6ull.inc
        IMAGE_CLASSES:remove = " image_type_tezi"
        IMAGE_FSTYPES:remove  = "teziimg"
        IMAGE_CLASSES:append = " image_type_pv_tezi pv-tezi-uboot"
        IMAGE_FSTYPES:append = " pv_teziimg"
        UBOOT_CONFIG_BASENAME:colibri-imx6ull = "colibri-imx6ull"
    pvgo: |
        PREFERRED_VERSION_pvgo-binary-native = "1.24.13"
    rm_work: |
        INHERIT += "rm_work"
    package_management: |
        PACKAGE_CLASSES = "package_rpm"
    panta-base: |
        TMPDIR = "${TOPDIR}/tmp-${DISTRO_CODENAME}"
    pantavisor-system: |
        DISTRO_FEATURES:append = " pantavisor-system "
        PANTAVISOR_FEATURES:append = " dm-crypt"
        PANTAVISOR_FEATURES:append = " dm-verity"
        PANTAVISOR_FEATURES:append = " autogrow"
        INITRAMFS_IMAGE = "pantavisor-initramfs"
    pantavisor-runc: |
        PANTAVISOR_FEATURES:append = " runc"
    pantavisor-tailscale: |
        PANTAVISOR_FEATURES:append = " tailscale"
    pantavisor-debug: |
        PANTAVISOR_FEATURES:append = " debug"
    __menu_config_locals: ''
    __menu_config_vars: |-
        EXTRA_IMAGE_FEATURES:append = " debug-tweaks"
        INHERIT += "rm_work"
machine: colibri-imx6ull
defaults:
    repos:
        branch: scarthgap
target:
- pantavisor-starter
- mc:tezi-recovery:imx-boot
build_system: oe
distro: panta-distro
env:
    PVROOT_IMAGE_BSP:
    PV_BOOT_OEMARGS:
