local_conf_header:
    platform-freescale: |
        ACCEPT_FSL_EULA = "1"
    scarthgap-variscite: |
        BB_DANGLINGAPPENDS_WARNONLY = "1"
        PANTAVISOR_FEATURES:append = " caam-nxp"
        PV_UBOOT_AUTOFDT = "1"
    platform-imx8mn-var-som: |
        PV_FLASH_README = "docs/flashing/boards/imx8mn-var-som.md"
        PV_FLASH_README_DEPS = "docs/flashing/sdcard.md docs/flashing/uuu.md"
    pvgo: |
        PREFERRED_VERSION_pvgo-binary-native = "1.24.13"
    rm_work: |
        INHERIT += "rm_work"
    package_management: |
        PACKAGE_CLASSES = "package_rpm"
    panta-base: |
        TMPDIR = "${TOPDIR}/tmp-${DISTRO_CODENAME}"
    pantavisor-system: |
        DISTRO_FEATURES:append = " pantavisor-system "
        PANTAVISOR_FEATURES:append = " dm-crypt"
        PANTAVISOR_FEATURES:append = " dm-verity"
        PANTAVISOR_FEATURES:append = " autogrow"
        INITRAMFS_IMAGE = "pantavisor-initramfs"
    pantavisor-runc: |
        PANTAVISOR_FEATURES:append = " runc"
    pantavisor-tailscale: |
        PANTAVISOR_FEATURES:append = " tailscale"
    pantavisor-debug: |
        PANTAVISOR_FEATURES:append = " debug"
    __menu_config_locals: ''
    __menu_config_vars: |-
        EXTRA_IMAGE_FEATURES:append = " debug-tweaks"
        INHERIT += "rm_work"
machine: imx8mn-var-som
defaults:
    repos:
        branch: scarthgap
target:
- pantavisor-starter
build_system: oe
distro: panta-distro
env:
    PVROOT_IMAGE_BSP:
    PV_BOOT_OEMARGS:
