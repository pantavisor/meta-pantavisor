header:
  version: 16
  includes:
    - kas/platforms/toradex.yaml

machine: colibri-imx6ull

local_conf_header:
  platform-colibri-imx6ull: |
        PV_FLASH_README = "docs/how-to-install/boards/colibri-imx6ull.md"
        PV_FLASH_README_DEPS = "docs/how-to-install/toradex.md"
        include conf/machine/include/colibri-imx6ull.inc
        IMAGE_CLASSES:remove = " image_type_tezi"
        IMAGE_FSTYPES:remove = "teziimg"
        IMAGE_FSTYPES:pn-pantavisor-starter:append = " ubifs"
        MKUBIFS_ARGS = "-m 2048 -e 126976 -c 4096"
        UBOOT_CONFIG_BASENAME:colibri-imx6ull = "colibri-imx6ull"
        PANTAVISOR_MACHINE_FIRMWARE:pn-empty-image = "${MACHINE_FIRMWARE}"
        PV_FLASH_RECOVERY_MC = "tezi-recovery"
        PV_FLASH_RECOVERY_RECIPE = "u-boot-toradex"
        PV_FLASH_RECOVERY_IMAGE = "u-boot.imx-recoverytezi"
