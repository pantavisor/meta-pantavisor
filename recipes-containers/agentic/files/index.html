<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pv-llama chat</title>
<style>
  :root { --bg:#101418; --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
          --user:#1f6feb; --asst:#30363d; --warn:#d29922; --err:#f85149;
          --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif;
         display:flex; flex-direction:column; height:100vh; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px;
           background:#0d1117; border-bottom:1px solid #30363d; }
  header h1 { margin:0; font-size:14px; font-weight:600; }
  header .tabs { margin-left:auto; display:flex; gap:4px; }
  .tab { padding:6px 12px; cursor:pointer; border-radius:4px;
         color:var(--muted); user-select:none; }
  .tab.on { background:#21262d; color:var(--fg); }
  select, button, input, textarea {
    background:#21262d; color:var(--fg); border:1px solid #30363d;
    border-radius:4px; padding:6px 10px; font:inherit; }
  button { cursor:pointer; }
  button:hover { background:#30363d; }
  main { flex:1; display:flex; min-height:0; }
  .panel { flex:1; display:none; flex-direction:column; min-height:0; }
  .panel.on { display:flex; }
  /* Chat */
  #chat-msgs { flex:1; overflow-y:auto; padding:12px 16px; }
  .msg { display:block; margin:8px 0; padding:8px 12px; border-radius:8px;
         max-width:80ch; white-space:pre-wrap; word-break:break-word; }
  .msg.user { background:var(--user); margin-left:auto; }
  .msg.assistant { background:var(--asst); }
  .msg.system { background:transparent; color:var(--muted);
                font-style:italic; font-size:12px; padding:4px 8px; }
  .msg.error { background:var(--err); }
  #chat-form { display:flex; gap:8px; padding:10px 12px;
               border-top:1px solid #30363d; background:#0d1117; }
  #chat-input { flex:1; resize:none; min-height:40px; max-height:160px;
                font-family:var(--mono); }
  /* Monitor */
  #mon-list { flex:1; overflow-y:auto; padding:0; margin:0;
              list-style:none; font-family:var(--mono); font-size:12px; }
  #mon-list li { padding:8px 14px; border-bottom:1px solid #21262d; }
  #mon-list .meta { color:var(--muted); display:flex; gap:16px;
                    margin-bottom:4px; }
  #mon-list .input { color:var(--accent); white-space:pre-wrap; }
  #mon-list .output { white-space:pre-wrap; margin-top:4px; }
  #mon-list .err { color:var(--err); }
  #mon-list .empty { color:var(--muted); padding:14px; }
</style>
</head>
<body>
<header>
  <h1>pv-llama chat</h1>
  <select id="model"></select>
  <button id="clear">Clear</button>
  <span class="tabs">
    <span class="tab on" data-panel="chat">Chat</span>
    <span class="tab" data-panel="monitor">Monitor</span>
  </span>
</header>
<main>
  <section class="panel on" id="panel-chat">
    <div id="chat-msgs"></div>
    <form id="chat-form">
      <textarea id="chat-input" placeholder="Type a message — Enter to send, Shift+Enter for newline"></textarea>
      <button id="send">Send</button>
    </form>
  </section>
  <section class="panel" id="panel-monitor">
    <ul id="mon-list"><li class="empty">Waiting for completions…</li></ul>
  </section>
</main>
<script>
"use strict";

// ---- tabs ----
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("on"));
    document.querySelectorAll(".panel").forEach(x => x.classList.remove("on"));
    t.classList.add("on");
    document.getElementById("panel-" + t.dataset.panel).classList.add("on");
  });
});

// ---- models ----
const modelSel = document.getElementById("model");
async function loadModels() {
  try {
    const r = await fetch("/api/models");
    const j = await r.json();
    const list = (j.data || []).map(m => m.id);
    modelSel.innerHTML = list.map(m => `<option>${m}</option>`).join("");
  } catch (e) {
    modelSel.innerHTML = `<option>(no models — pv-llama unreachable)</option>`;
  }
}
loadModels();

// ---- chat ----
const msgs = document.getElementById("chat-msgs");
const input = document.getElementById("chat-input");
const form = document.getElementById("chat-form");
const sendBtn = document.getElementById("send");
const clearBtn = document.getElementById("clear");

const history = [];

function bubble(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

clearBtn.addEventListener("click", () => {
  history.length = 0;
  msgs.innerHTML = "";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});

form.addEventListener("submit", async e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  sendBtn.disabled = true;

  bubble("user", text);
  history.push({ role: "user", content: text });
  const out = bubble("assistant", "");
  out.textContent = "…";

  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: modelSel.value,
        messages: history,
        stream: true,
      }),
    });
    if (!r.ok) {
      out.classList.replace("assistant", "error");
      out.textContent = `HTTP ${r.status}: ${await r.text()}`;
      sendBtn.disabled = false;
      return;
    }
    out.textContent = "";
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    let acc = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      // Parse complete SSE events (split on blank-line).
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const ev = buf.slice(0, idx); buf = buf.slice(idx + 2);
        for (const line of ev.split("\n")) {
          if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (data === "[DONE]") continue;
          try {
            const obj = JSON.parse(data);
            const piece = obj.choices?.[0]?.delta?.content;
            if (piece) {
              acc += piece;
              out.textContent = acc;
              msgs.scrollTop = msgs.scrollHeight;
            }
          } catch {}
        }
      }
    }
    history.push({ role: "assistant", content: acc });
  } catch (e) {
    out.classList.replace("assistant", "error");
    out.textContent = String(e);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});

// ---- monitor ----
const monList = document.getElementById("mon-list");
let monStarted = false;
function startMonitor() {
  if (monStarted) return;
  monStarted = true;
  const es = new EventSource("/api/monitor");
  es.onmessage = e => {
    if (monList.querySelector(".empty")) monList.innerHTML = "";
    let rec;
    try { rec = JSON.parse(e.data); } catch { return; }
    const li = document.createElement("li");
    const ts = new Date((rec.started_at || 0) * 1000).toLocaleTimeString();
    const meta = document.createElement("div"); meta.className = "meta";
    meta.textContent = `${ts}  model=${rec.model}  ${rec.duration_s}s${rec.stream ? "  stream" : ""}`;
    const inp = document.createElement("div"); inp.className = "input";
    inp.textContent = rec.input || "";
    li.appendChild(meta); li.appendChild(inp);
    if (rec.error) {
      const er = document.createElement("div"); er.className = "err";
      er.textContent = "error: " + rec.error;
      li.appendChild(er);
    } else if (rec.output) {
      const out = document.createElement("div"); out.className = "output";
      out.textContent = rec.output;
      li.appendChild(out);
    }
    // Newest on top, cap at 200 entries.
    monList.insertBefore(li, monList.firstChild);
    while (monList.children.length > 200) monList.removeChild(monList.lastChild);
  };
}
// Auto-connect when monitor tab is opened.
document.querySelector('.tab[data-panel="monitor"]')
  .addEventListener("click", startMonitor);
</script>
</body>
</html>
