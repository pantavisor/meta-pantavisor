name: 'Build Target Image'

on:
  workflow_call:
    inputs:
      machine_name:
        required: true
        type: string
      configs:
        required: true
        type: string
      build_target:
        required: false
        type: string
      output:
        required: false
        type: string
      sdk:
        required: false
        type: number
      ref:
        description: 'Specific git ref (commit SHA, branch, tag) to build; defaults to the triggering SHA'
        required: false
        type: string

jobs:
  build:
    env:
     TMPDIR : "tmp-scarthgap"
    runs-on: ["self-hosted"]
    container:
      image: ghcr.io/pantacor/kas/kas:next-v7
      volumes:
        - shared:/shared
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Fetch tags
        run: |
          git config --global --add safe.directory '*'
          git fetch --tags --force --depth=${{ inputs.fetch-depth || 1 }}
      - name: setup workspace
        env:
          EFFECTIVE_REF: ${{ inputs.ref || github.sha }}
        run: |
          chown -R builder:builder $RUNNER_WORKSPACE
          chown -R builder:builder /__w
          mkdir -p /shared/sstate && chown builder:builder /shared/sstate && mkdir -p /shared/dldir && chown builder:builder /shared/dldir
          su - builder -c "cd $GITHUB_WORKSPACE && git fetch origin $EFFECTIVE_REF && git reset --hard $EFFECTIVE_REF && rm -rf build/ && git clean -f -f -d -x "
          git config --global --add safe.directory /__w/meta-pantavisor/meta-pantavisor

      - name: build
        run: |
           su - builder -c "cd $GITHUB_WORKSPACE && env  && kas build ${{ inputs.configs }} --target ${{ inputs.build_target }} "

      - name: build with sdk
        if: inputs.sdk == 1
        run: |
           su - builder -c "cd $GITHUB_WORKSPACE && env && kas shell ${{ inputs.configs }} -c 'bitbake -c populate_sdk ${{ inputs.build_target }}'"

      - name: prepare files for distribution
        if: always()
        run: |
          chmod -R 777 $GITHUB_WORKSPACE
          BUILD_BASE_DIR=$(echo build/${{ env.TMPDIR }}/deploy/images/*)
          for pattern in ${{ inputs.output }}; do
            find "${BUILD_BASE_DIR}" -maxdepth 1 -name "$pattern" -exec cp {} . \;
          done
          find build/${{ env.TMPDIR }}/deploy/images/ -name "*pvrexport.tgz" -exec cp {} . \; 2>/dev/null || true

          find build/${{ env.TMPDIR }}/deploy/images/ -name "test.docker.sh" -exec cp {} . \; 2>/dev/null || true
          find build/${{ env.TMPDIR }}/deploy/images/ -name "pantavisor-appengine*-docker.tar" -exec cp {} . \; 2>/dev/null || true

          UNPACKED_DIR=$(find "${BUILD_BASE_DIR}" -maxdepth 1 -type d -name "pantavisor-appengine-distro-*" | head -1)
          if [ -d "$UNPACKED_DIR" ]; then
            mkdir -p pvtest-distro
            cp -r "${UNPACKED_DIR}/." ./pvtest-distro/
          fi

          find build/${{ env.TMPDIR }}/deploy/images/ -name "*.manifest.txt" -exec cp {} . \; 2>/dev/null || true
          find build/${{ env.TMPDIR }}/deploy/images/ -name "*.manifest.patch" -exec cp {} . \; 2>/dev/null || true

          find build/${{ env.TMPDIR }}/deploy/sdk/ -name "panta*.sh" -exec cp {} . \; 2>/dev/null || true
          ls -l .

## File distribution
      - name: Archive pvtest distro
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pvtest-distro-${{ inputs.machine_name }}
          path: pvtest-distro/
          if-no-files-found: ignore
