name: "onpush: scarthgap"

on:
  push:
    paths:
      - '**'
      # Skip pushes that only touch CI internals (generators,
      # docs templates, badge upload helper, …) — these don't
      # change what's built.
      - '!.github/**'
      # …but the reusable build workflow and this matrix file
      # itself ARE part of what's built; re-include them so
      # changes to the build pipeline retrigger CI.
      - '.github/workflows/buildkas-target.yaml'
      - '.github/workflows/call-pvtests.yaml'
      - '.github/workflows/onpush-scarthgap.yaml'
  # NOTE: no 'pull_request:' trigger. Pushes to same-repo branches
  # already emit check runs bound to the head SHA, so PRs show
  # those results in their checks tab without a duplicate run.
  # Fork PRs intentionally do NOT trigger CI on our self-hosted
  # runners — a maintainer must push the branch into this repo
  # to get a build.

jobs:
  build-hw:
    name: "build (${{ matrix.machine_name }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine_name: sunxi-bananapi-m2-berry-scarthgap
            configs: kas/build-configs/release/sunxi-bananapi-m2-berry-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 1
          - machine_name: raspberrypi-armv8-scarthgap
            configs: kas/build-configs/release/raspberrypi-armv8-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 1
    uses: ./.github/workflows/buildkas-target.yaml
    with:
      configs: ${{ matrix.configs }}
      machine_name: ${{ matrix.machine_name }}
      build_target: ${{ matrix.build_target }}
      output: ${{ matrix.output }}
      sdk: ${{ matrix.sdk }}
    secrets: inherit

  build-docker:
    name: "build (docker-x86_64-scarthgap)"
    uses: ./.github/workflows/buildkas-target.yaml
    with:
      configs: kas/build-configs/release/docker-x86_64-scarthgap.yaml:kas/build-configs/shared-vols.yaml
      machine_name: docker-x86_64-scarthgap
      build_target: pantavisor-appengine-distro
      output: "pantavisor-appengine-distro-*.tar.gz"
      sdk: 0
    secrets: inherit

  pvtest-lifecycle:
    needs: build-docker
    uses: ./.github/workflows/call-pvtests.yaml
    with:
      test_path: local/lifecycle
    secrets: inherit

  summary:
    needs: [build-hw, build-docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Machine | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs | jq -r '.jobs[] | select(.name | startswith("build (")) | "| " + (.name | ltrimstr("build (") | rtrimstr(")")) + " | " + (if .conclusion == "success" then "✅" elif .conclusion == "failure" then "❌" elif .conclusion == "cancelled" then "🚫" elif .conclusion == "skipped" then "⏭️" else (.conclusion // "🔄") end) + " |"' >> $GITHUB_STEP_SUMMARY
