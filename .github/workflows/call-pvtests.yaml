name: "run pvtests"

env:
  WORKSPACE: /tmp/workspace-${{ github.run_id }}
  PVTEST_WORKSPACE: /tmp/pvtest-workspace-${{ github.run_id }}

on:
  workflow_call:
    inputs:
      test_path:
        required: false
        type: string
      parallel:
        description: 'Number of tests to run in parallel'
        required: false
        type: string
        default: "4"
jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate test_path input
        id: check
        run: |
          if [[ -z "${{ inputs.test_path }}" ]]; then
            echo "✅ test_path is empty — running all tests"
            echo "=== Running: all tests ===" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ inputs.test_path }}" != local* && "${{ inputs.test_path }}" != remote* ]]; then
            echo "❌ Invalid test_path: '${{ inputs.test_path }}'"
            echo "Must start with 'local' or 'remote', or be empty to run all"
            exit 1
          else
            echo "✅ test_path is valid: ${{ inputs.test_path }}"
            echo "=== Running: ${{ inputs.test_path }} ===" >> $GITHUB_STEP_SUMMARY
          fi

  tests:
    needs: validate
    runs-on: ["pvtest-runner"]
    steps:
      - name: Download pvtest distro
        uses: actions/download-artifact@v7
        with:
          name: pvtest-distro-docker-x86_64-scarthgap
          path: ${{ env.WORKSPACE }}

      - name: Load Docker images
        working-directory: ${{ env.WORKSPACE }}
        run: |
          chmod +x test.docker.sh
          CI_MODE=true ./test.docker.sh install-docker

      - name: Run pvtests
        working-directory: ${{ env.WORKSPACE }}
        env:
          PH_USER: ${{ secrets.PH_USER }}
          PH_PASS: ${{ secrets.PH_PASS }}
        run: |
          TEST_TARGET="${{ inputs.test_path }}"

          echo "=== AppEngine Test Run started at $(date) ==="

          echo "------------------------------------------------------"
          echo "RUNNING: ${TEST_TARGET:-all}"
          echo "------------------------------------------------------"

          PARALLEL=${{ inputs.parallel }}

          if [[ -z "$TEST_TARGET" ]]; then
            ./test.docker.sh -v run -V --retry 2 -p "$PARALLEL" -w $PVTEST_WORKSPACE
          elif [[ "$TEST_TARGET" == remote* ]]; then
            ./test.docker.sh -v run "$TEST_TARGET" -V --retry 2 -w $PVTEST_WORKSPACE
          else
            ./test.docker.sh -v run "$TEST_TARGET" -V -p "$PARALLEL" -w $PVTEST_WORKSPACE
          fi

      - name: Show Tests Summary
        working-directory: ${{ env.WORKSPACE }}
        if: always()
        run: |
          if [ -f run.log ]; then
            {
              echo '```'
              sed -n '/SUMMARY/,$p' run.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Tests Run Failed (no log found)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show test.log issues
        if: always()
        run: |
          found=0
          while IFS= read -r -d '' logfile; do
            test_name="${logfile#${{ env.PVTEST_WORKSPACE }}/}"
            test_name="${test_name%/test.log}"
            issues=$(grep -E "^\[pvtest\] [0-9]+ (WARN|ERROR) --" "$logfile" 2>/dev/null || true)
            if [ -n "$issues" ]; then
              if [ "$found" -eq 0 ]; then
                echo "## Test log issues" >> "$GITHUB_STEP_SUMMARY"
                found=1
              fi
              printf '\n### %s\n```\n%s\n```\n' "$test_name" "$issues" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < <(find "${{ env.PVTEST_WORKSPACE }}" -name "test.log" -print0 2>/dev/null)

      - name: Prepare pvtest workspace
        if: always()
        run: |
          suffix="${{ inputs.test_path }}"
          suffix="${suffix//\//-}"
          sha="${{ github.sha }}"
          sha="${sha:0:7}"
          echo "PVTEST_ARTIFACT_NAME=pvtest-workspace-${sha}-${suffix:-all}" >> $GITHUB_ENV

          sudo chown -R $(id -u):$(id -g) $PVTEST_WORKSPACE || true

      - name: Upload pvtest workspace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PVTEST_ARTIFACT_NAME }}
          path: |
            ${{ env.PVTEST_WORKSPACE }}/README.md
            ${{ env.PVTEST_WORKSPACE }}/run.log
            ${{ env.PVTEST_WORKSPACE }}/local
            ${{ env.PVTEST_WORKSPACE }}/remote
          if-no-files-found: ignore

      - name: Clean up
        if: always()
        run: |
          docker ps -aq \
          | xargs -r docker inspect --format '{{.Image}} {{.ID}}' \
          | grep -E 'pantavisor-appengine(-netsim|-tester)?' \
          | awk '{print $2}' \
          | xargs -r docker rm -f

          docker images --format '{{.Repository}}:{{.Tag}}' \
          | grep -E '^pantavisor-appengine(-netsim|-tester)?:' \
          | xargs -r docker rmi -f

          rm -rf $WORKSPACE
          sudo rm -rf $PVTEST_WORKSPACE
