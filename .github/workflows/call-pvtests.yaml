name: "run pvtests"

env:
  WORKSPACE: /tmp/workspace-${{ github.run_id }}

on:
  workflow_call:
    inputs:
      test_type:
        required: true
        type: string
      test_number:
        required: false
        type: string
jobs:

  validate:
    runs-on: ubuntu-latest
    outputs:
      has_test_number: ${{ steps.check.outputs.has_test_number }}
    steps:
      - name: Validate test_type input
        id: check
        run: |
          if [[ "${{ inputs.test_type }}" != "pvtests-local" && "${{ inputs.test_type }}" != "pvtests-remote" ]]; then
            echo "❌ Invalid test_type: '${{ inputs.test_type }}'"
            echo "Allowed values: pvtests-local, pvtests-remote"
            exit 1
          fi
          echo "✅ test_type is valid: ${{ inputs.test_type }}"

          if [[ -n "${{ inputs.test_number }}" ]]; then
            echo "test_number was provided: ${{ inputs.test_number }}"
            echo "=== Running test number: ${{ inputs.test_number }} ==="
            echo "has_test_number=true" >> $GITHUB_OUTPUT
          else
            echo "test_number was not provided"
            echo "=== Running All tests ==="
            echo "has_test_number=false" >> $GITHUB_OUTPUT
          fi

          if [[ -n "${{ inputs.test_number }}" ]]; then
            echo "Running ${{ inputs.test_type }}":${{ inputs.test_number }} >> $GITHUB_STEP_SUMMARY
          else
            echo "Running all tests for ${{ inputs.test_type }}" >> $GITHUB_STEP_SUMMARY
          fi

  build-docker-x86_64-scarthgap:
    needs: validate
    uses: ./.github/workflows/buildkas-target.yaml
    with:
      configs: .github/configs/release/docker-x86_64-scarthgap.yaml:.github/configs/shared-vols.yaml
      machine_name: docker-x86_64-scarthgap
      build_target: pantavisor-appengine-distro
      output: pantavisor-appengine-distro-*.tar.gz
      sdk: 0
    secrets: inherit

  tests:
    needs: build-docker-x86_64-scarthgap
    runs-on: ["pvtest-runner"]
    steps:
      - name: Clone ${{ inputs.test_type }} repository
        run: |
          mkdir -p $WORKSPACE
          cd $WORKSPACE
          git clone https://gitlab.com/pantacor/${{ inputs.test_type }}.git ${{ inputs.test_type }}

      - name: Download AppEngine artifacts
        uses: actions/download-artifact@v8
        with:
          name: appengine-docker-x86_64-scarthgap
          path: ${{ env.WORKSPACE }}

      - name: Run pvtests
        working-directory: ${{ env.WORKSPACE }}
        run: |
          chmod +x test.docker.sh

          for tar in pantavisor-appengine-*-docker.tar pantavisor-appengine-docker.tar; do
            [ -f "$tar" ] && docker load -i "$tar"
          done

          echo "=== AppEngine Test Run started at $(date) ==="

          TEST_TARGET="${{ inputs.test_type }}"
          [[ "${{ needs.validate.outputs.has_test_number }}" == "true" ]] && TEST_TARGET="${{ inputs.test_type }}:${{ inputs.test_number }}"

          echo "------------------------------------------------------"
          echo "RUNNING: $TEST_TARGET"
          echo "------------------------------------------------------"

          if [[ "${{ inputs.test_type }}" == "pvtests-remote" ]]; then
            PH_USER='${{ secrets.PH_USER }}' PH_PASS='${{ secrets.PH_PASS }}' \
            ./test.docker.sh run "$TEST_TARGET" 2>&1 | tee /tmp/pvtests-run.log
          else
            ./test.docker.sh run "$TEST_TARGET" 2>&1 | tee /tmp/pvtests-run.log
          fi
          echo "PVTEST_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

          LOG_PATH=$(grep -m1 'Info: test logs can be found at' /tmp/pvtests-run.log | sed 's/.*Info: test logs can be found at //')
          echo "PVTEST_LOG=${LOG_PATH}" >> $GITHUB_ENV

      - name: Show Tests Summary
        if: always()
        run: |
          if [ -n "${{ env.PVTEST_LOG }}" ] && [ -f "${{ env.PVTEST_LOG }}" ]; then
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "${{ env.PVTEST_LOG }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## Tests Run Failed (no log found)" >> $GITHUB_STEP_SUMMARY
          fi
          [ "${{ env.PVTEST_EXIT }}" = "0" ] || exit 1

      - name: Upload workspace on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pvtests-workspace
          path: ${{ env.WORKSPACE }}

      - name: Upload log on success
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: pvtests-log
          path: ${{ env.PVTEST_LOG }}

      - name: Clean up
        if: always()
        run: |
          docker ps -aq \
          | xargs -r docker inspect --format '{{.Image}} {{.ID}}' \
          | grep -E 'pantavisor-appengine(-netsim|-tester)?' \
          | awk '{print $2}' \
          | xargs -r docker rm -f

          docker images --format '{{.Repository}}:{{.Tag}}' \
          | grep -E '^pantavisor-appengine(-netsim|-tester)?:' \
          | xargs -r docker rmi -f

          rm -rf $WORKSPACE