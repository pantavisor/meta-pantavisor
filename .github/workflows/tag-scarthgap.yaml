name: "TAG: scarthgap"

on:
  push:
    paths:
      - '**'
      - 'kas/build-configs/**'
      - '.github/workflows/tag-scarthgap.yaml'
      - '!.github/scripts/**'
      - '!.github/templates/**'
    tags:
      - 0*
      - '*-rc*'

jobs:
  build:
    name: "build (${{ matrix.machine_name }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine_name: sunxi-orange-pi-3lts-scarthgap
            configs: kas/build-configs/release/sunxi-orange-pi-3lts-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: sunxi-orange-pi-r1-scarthgap
            configs: kas/build-configs/release/sunxi-orange-pi-r1-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: sunxi-bananapi-m2-berry-scarthgap
            configs: kas/build-configs/release/sunxi-bananapi-m2-berry-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 1
          - machine_name: imx8qxp-b0-mek-scarthgap
            configs: kas/build-configs/release/imx8qxp-b0-mek-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: raspberrypi-armv8-scarthgap
            configs: kas/build-configs/release/raspberrypi-armv8-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 1
          - machine_name: rpi-scarthgap
            configs: kas/build-configs/release/rpi-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: radxa-rock5a-scarthgap
            configs: kas/build-configs/release/radxa-rock5a-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: imx8mn-var-som-scarthgap
            configs: kas/build-configs/release/imx8mn-var-som-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: imx8mm-var-dart-scarthgap
            configs: kas/build-configs/release/imx8mm-var-dart-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-starter
            output: "pantavisor-starter*.rootfs.wic*"
            sdk: 0
          - machine_name: docker-x86_64-scarthgap
            configs: kas/build-configs/release/docker-x86_64-scarthgap.yaml:kas/build-configs/shared-vols.yaml
            build_target: pantavisor-appengine-distro
            output: "pantavisor-appengine-distro-*.tar.gz"
            sdk: 0
    uses: ./.github/workflows/buildkas-upload.yaml
    with:
      configs: ${{ matrix.configs }}
      machine_name: ${{ matrix.machine_name }}
      build_target: ${{ matrix.build_target }}
      output: ${{ matrix.output }}
      sdk: ${{ matrix.sdk }}
    secrets: inherit

  summary:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Machine | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs | jq -r '.jobs[] | select(.name | startswith("build (")) | "| " + (.name | ltrimstr("build (") | rtrimstr(")")) + " | " + (if .conclusion == "success" then "✅" elif .conclusion == "failure" then "❌" elif .conclusion == "cancelled" then "🚫" elif .conclusion == "skipped" then "⏭️" else (.conclusion // "🔄") end) + " |"' >> $GITHUB_STEP_SUMMARY
