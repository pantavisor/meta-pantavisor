name: "MAN: specific pvtests-remote-docker-x86_64-scarthgap-appengine"

on:
  workflow_dispatch:
    inputs:
      test_number:
        description: 'Test number to run (e.g., "0" for remote:0)'
        required: true
        type: string

jobs:

  build-docker-x86_64-scarthgap:
    uses: ./.github/workflows/buildkas-target.yaml
    with:
      configs: .github/configs/release/docker-x86_64-scarthgap.yaml:.github/configs/shared-vols.yaml
      machine_name: docker-x86_64-scarthgap
      build_target: pantavisor-appengine-distro
      output: pantavisor-appengine-distro-*.tar.gz
      sdk: 0
    secrets: inherit

  pvtests-local-appengine:
    needs: build-docker-x86_64-scarthgap
    runs-on: ["pvtest-runner"]
    steps:
      - name: Download AppEngine artifacts
        uses: actions/download-artifact@v4
        with:
          name: appengine-docker-x86_64-scarthgap
          path: .

      - name: Clone pvtests-local repository
        run: |
          rm -rf pvtests-remote
          git clone https://gitlab.com/pantacor/pvtests-remote.git pvtests-remote

      - name: Load and prepare
        env:
            CI_MODE: "true"
        run: |
          chmod +x test.docker.sh

          for tar in pantavisor-appengine-*-docker.tar pantavisor-appengine-docker.tar; do
            [ -f "$tar" ] && docker load -i "$tar"
          done

          echo "=== Avaliable Tests === "
          ./test.docker.sh ls

      - name: Run AppEngine test
        run: |
          set -e
          set -o pipefail

          echo "=== AppEngine Test Run started at $(date) ==="

          TEST_NUMBER="${{ github.event.inputs.test_number }}"

          echo "---------------------------------------------------------------"
          echo "RUNNING TEST pvtests-remote:$TEST_NUMBER"
          echo "---------------------------------------------------------------"


          PH_USER='${{ secrets.PH_USER }}' PH_PASS='${{ secrets.PH_PASS }}' \
          ./test.docker.sh -v run pvtests-remote:$TEST_NUMBER 2>&1 \
          | tee -a pvtests-remote.log

          LOG_NAME="pvtests-remote-$TEST_NUMBER-$(date +%s).log"
          mv pvtests-remote.log "$LOG_NAME"
          echo "LOG_NAME=$LOG_NAME" >> $GITHUB_ENV


      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pvtests-remote
          path: ${{ env.LOG_NAME }}

      - name: Clean up
        if: always()
        run: |
          docker ps -aq \
          | xargs -r docker inspect --format '{{.Image}} {{.ID}}' \
          | grep -E 'pantavisor-appengine(-netsim|-tester)?' \
          | awk '{print $2}' \
          | xargs -r docker rm -f

          docker images --format '{{.Repository}}:{{.Tag}}' \
          | grep -E '^pantavisor-appengine(-netsim|-tester)?:' \
          | xargs -r docker rmi -f

          rm pantavisor-appengine-*
          rm -rf pvtests-remote