name: "ontag: build and publish docs"

# Runs after "ontag: sync and release" (tag-scarthgap.yaml) completes.
# Builds the pantavisor-starter docs tarball for raspberrypi-armv8, attaches
# it to the GitHub release, uploads to S3/releases.json, then sends a
# repository_dispatch event to pantavisor/docs.pantavisor to trigger docs-sync.yml.
on:
  workflow_run:
    workflows: ["ontag: sync and release"]
    types:
      - completed

jobs:
  build-docs:
    if: github.event.workflow_run.conclusion != 'cancelled'
    env:
      TMPDIR: "tmp-scarthgap"
    runs-on: ["self-hosted"]
    container:
      image: ghcr.io/pantacor/kas/kas:next-v7
      volumes:
        - shared:/shared
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Fetch tags
        run: |
          git config --global --add safe.directory '*'
          git fetch --tags --force

      - name: setup workspace
        run: |
          chown -R builder:builder $RUNNER_WORKSPACE
          chown -R builder:builder /__w
          mkdir -p /shared/sstate && chown builder:builder /shared/sstate && mkdir -p /shared/dldir && chown builder:builder /shared/dldir
          su - builder -c "cd $GITHUB_WORKSPACE && git fetch origin $GITHUB_SHA && git reset --hard $GITHUB_SHA && rm -rf build/ && git clean -f -f -d -x"
          git config --global --add safe.directory /__w/meta-pantavisor/meta-pantavisor

      - name: build docs
        run: |
          su - builder -c "cd $GITHUB_WORKSPACE && kas build kas/build-configs/release/raspberrypi-armv8-scarthgap.yaml:kas/build-configs/shared-vols.yaml -- -c create_pantacor_docs pantavisor-starter"

      - name: collect docs tarball
        run: |
          chmod -R 777 $GITHUB_WORKSPACE
          mkdir -p docs-out
          find build/${{ env.TMPDIR }}/deploy/images/raspberrypi-armv8 -name "*.rootfs.docs.tar.zst" ! -type l -exec cp {} docs-out/ \;
          ls -l docs-out

      - name: upload docs to S3 and update releases.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          AWS_S3_URL="https://pantavisor-ci.s3.amazonaws.com/meta-pantavisor"
          RELEASE_FILE="releases.json"
          TAG="${{ github.event.workflow_run.head_branch }}"

          ORIG_FILEPATH=$(ls docs-out/*.rootfs.docs.tar.zst)
          ORIG_FILENAME=$(basename "${ORIG_FILEPATH}")
          # pantavisor-starter-<rest>.rootfs.docs.tar.zst → pantavisor-<rest>.docs.tar.zst
          NEW_FILENAME=$(echo "${ORIG_FILENAME}" \
            | sed 's/pantavisor-starter-/pantavisor-/' \
            | sed 's/\.rootfs\.docs\.tar\.zst$/.docs.tar.zst/')
          cp "${ORIG_FILEPATH}" "docs-out/${NEW_FILENAME}"

          DOCS_CSUM=$(sha256sum "docs-out/${NEW_FILENAME}" | cut -d' ' -f1)

          aws s3 cp "docs-out/${NEW_FILENAME}" "s3://${AWS_S3_BUCKET}/${TAG}/${NEW_FILENAME}"
          DOCS_S3_URL="${AWS_S3_URL}/${TAG}/${NEW_FILENAME}"

          case "$TAG" in
            *-rc*)  RELEASE_TYPE="release-candidate" ;;
            [0-9]*) RELEASE_TYPE="stable" ;;
            *)      echo "WARN: cannot determine release type for tag '${TAG}'" >&2
                    RELEASE_TYPE="unknown" ;;
          esac

          aws s3 cp "s3://${AWS_S3_BUCKET}/${RELEASE_FILE}" "${RELEASE_FILE}" || echo "{}" > "${RELEASE_FILE}"

          jq --arg type "${RELEASE_TYPE}" \
             --arg rname "${TAG}" \
             --arg docs_name "${NEW_FILENAME}" \
             --arg docs_sha "${DOCS_CSUM}" \
             --arg docs_url "${DOCS_S3_URL}" \
          '
            .[$type] //= {} |
            .[$type][$rname] //= {} |
            .[$type][$rname].docs = {name: $docs_name, hash: $docs_sha, url: $docs_url}
          ' "${RELEASE_FILE}" > temp.json && mv temp.json "${RELEASE_FILE}"

          aws s3 cp "${RELEASE_FILE}" "s3://${AWS_S3_BUCKET}/${RELEASE_FILE}"

      - name: upload tarball to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          FILEPATH=$(ls docs-out/*.rootfs.docs.tar.zst)
          ARTIFACT_URL=$(python3 .github/scripts/upload-docs.py upload-asset \
            "${{ github.repository }}" "${TAG}" "${FILEPATH}" "${GITHUB_TOKEN}")
          echo "DOCS_ARTIFACT_URL=${ARTIFACT_URL}" >> "$GITHUB_ENV"
          echo "DOCS_FILENAME=$(basename ${FILEPATH})" >> "$GITHUB_ENV"

      - name: notify docs.pantavisor to sync
        env:
          PANTAVISOR_DOC_SYNC: ${{ secrets.PANTAVISOR_DOC_SYNC }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${PANTAVISOR_DOC_SYNC}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "{\"event_type\":\"docs-release\",\"client_payload\":{\"tag\":\"${TAG}\"}}" \
            https://api.github.com/repos/pantavisor/docs.pantavisor/dispatches
