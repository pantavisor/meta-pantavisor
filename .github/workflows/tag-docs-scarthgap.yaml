name: "ontag: build and publish docs"

# Runs after "ontag: sync and release" (tag-scarthgap.yaml) completes.
# Builds the pantavisor-starter docs tarball for raspberrypi-armv8, attaches
# it to the GitHub release, then triggers docs-ingest.yml on
# pantavisor/docs.pantavisor so the downstream workflow can open the PR.
on:
  workflow_run:
    workflows: ["ontag: sync and release"]
    types:
      - completed

jobs:
  build-docs:
    if: github.event.workflow_run.conclusion != 'cancelled'
    env:
      TMPDIR: "tmp-scarthgap"
    runs-on: ["self-hosted"]
    container:
      image: ghcr.io/pantacor/kas/kas:next-v7
      volumes:
        - shared:/shared
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Fetch tags
        run: |
          git config --global --add safe.directory '*'
          git fetch --tags --force

      - name: setup workspace
        run: |
          chown -R builder:builder $RUNNER_WORKSPACE
          chown -R builder:builder /__w
          mkdir -p /shared/sstate && chown builder:builder /shared/sstate && mkdir -p /shared/dldir && chown builder:builder /shared/dldir
          su - builder -c "cd $GITHUB_WORKSPACE && git fetch origin $GITHUB_SHA && git reset --hard $GITHUB_SHA && rm -rf build/ && git clean -f -f -d -x"
          git config --global --add safe.directory /__w/meta-pantavisor/meta-pantavisor

      - name: build docs
        run: |
          su - builder -c "cd $GITHUB_WORKSPACE && kas build kas/build-configs/release/raspberrypi-armv8-scarthgap.yaml:kas/build-configs/shared-vols.yaml -- -c create_pantacor_docs pantavisor-starter"

      - name: collect docs tarball
        run: |
          chmod -R 777 $GITHUB_WORKSPACE
          mkdir -p docs-out
          find build/${{ env.TMPDIR }}/deploy/images/raspberrypi-armv8 -name "*.rootfs.docs.tar.zst" ! -type l -exec cp {} docs-out/ \;
          ls -l docs-out

      - name: upload tarball to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          FILEPATH=$(ls docs-out/*.rootfs.docs.tar.zst)
          ARTIFACT_URL=$(python3 .github/scripts/upload-docs.py upload-asset \
            "${{ github.repository }}" "${TAG}" "${FILEPATH}" "${GITHUB_TOKEN}")
          echo "DOCS_ARTIFACT_URL=${ARTIFACT_URL}" >> "$GITHUB_ENV"
          echo "DOCS_FILENAME=$(basename ${FILEPATH})" >> "$GITHUB_ENV"

      - name: trigger docs-ingest on docs.pantavisor
        env:
          PANTAVISOR_DOC_SYNC: ${{ secrets.PANTAVISOR_DOC_SYNC }}
        run: |
          python3 .github/scripts/upload-docs.py trigger-ingest \
            "${DOCS_ARTIFACT_URL}" \
            "${DOCS_FILENAME}" \
            "${PANTAVISOR_DOC_SYNC}"
