name: 'Build Pantavisor Starter Image'

on:
  workflow_call:
    inputs:
      machine_name:
        required: true
        type: string
      configs:
        required: true
        type: string
      build_target:
        required: false
        type: string
      output:
        required: false
        type: string
      sdk:
        required: false
        type: number

jobs:
  build:
    env:
     TMPDIR : "tmp-scarthgap"
    runs-on: ["self-hosted"]
    container:
      image: ghcr.io/pantacor/kas/kas:next-v7
      volumes:
        - shared:/shared
      options: --user root
    steps:
      - uses: actions/checkout@v6
      - name: Fetch tags
        run: |
          git config --global --add safe.directory '*'
          git fetch --tags --force --depth=${{ inputs.fetch-depth || 1 }}
      - name: setup workspace
        run: |
         chown -R builder:builder $RUNNER_WORKSPACE
         chown -R builder:builder /__w
         mkdir -p /shared/sstate && chown builder:builder /shared/sstate && mkdir -p /shared/dldir && chown builder:builder /shared/dldir
         su - builder -c "cd $GITHUB_WORKSPACE && git fetch origin $GITHUB_SHA && git reset --hard $GITHUB_SHA && rm -rf build/ && git clean -f -f -d -x "
         git config --global --add safe.directory /__w/meta-pantavisor/meta-pantavisor

      - name: build
        run: |
         BUILD_TARGET="${{ inputs.build_target }}"
         su - builder -c "cd $GITHUB_WORKSPACE && env && kas build ${{ inputs.configs }} ${BUILD_TARGET:+--target $BUILD_TARGET}"
      - name: build-sdk
        run: |
           if [ "${{ inputs.sdk }}" = 1 ]; then
             su - builder -c "cd $GITHUB_WORKSPACE && env && kas shell ${{ inputs.configs }} -c 'bitbake -c populate_sdk ${{ inputs.build_target }}'"
           fi
      # Organize file for upload.sh
      - name: copy files
        run: |
         chmod -R 777 $GITHUB_WORKSPACE

         BUILD_BASE_DIR=$(echo build/${{ env.TMPDIR }}/deploy/images/*)

         mkdir -p images
         for pattern in ${{ inputs.output }}; do
            find "${BUILD_BASE_DIR}" -maxdepth 1 -name "$pattern" -exec cp {} images \;
         done

         mkdir -p pvexports
         find "${BUILD_BASE_DIR}" -name "*pvrexport.tgz" -exec cp {} pvexports \; 2>/dev/null || true

         UNPACKED_DIR=$(find "${BUILD_BASE_DIR}" -maxdepth 1 -type d -name "pantavisor-appengine-distro-*" | head -1)
         if [ -d "$UNPACKED_DIR" ]; then
           mkdir -p pvtest-distro
           cp -r "${UNPACKED_DIR}/." ./pvtest-distro/
         fi


         BUILD_SDK_DIR=$(ls -d build/${{ env.TMPDIR }}/deploy/sdk/ 2>/dev/null | head -n 1)

         if [ -n "$BUILD_SDK_DIR" ] && [ -d "$BUILD_SDK_DIR" ]; then
            FILES=$(find "$BUILD_SDK_DIR" -name "panta*.sh" 2>/dev/null)
            if [ -n "$FILES" ]; then
               mkdir -p sdk
               echo "$FILES" | xargs -r -I {} cp {} sdk/
            fi
         else
            echo "Warning: no sdk folder found - ignoring"
         fi

      - name: Archive pvtest distro (unpacked)
        uses: actions/upload-artifact@v7
        with:
          name: pvtest-distro-${{ inputs.machine_name }}
          path: pvtest-distro/
          if-no-files-found: ignore

      - name: Archive wic artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.build_target || 'pantavisor-starter' }}-${{ inputs.machine_name }}
          path: |
             images/${{ inputs.output }}
          if-no-files-found: ignore

      - name: Archive all pvrexport artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pvrexports-${{ inputs.machine_name }}
          path: |
            pvexports/*pvrexport.tgz
          if-no-files-found: ignore

      - name: Archive bsp pvrexport artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pantavisor-bsp-${{ inputs.machine_name }}
          path: |
            pvexports/pantavisor-bsp*
          if-no-files-found: ignore

      - name: Archive pv-flash-bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pv-flash-bundle-${{ inputs.machine_name }}
          path: |
            images/pv-flash-bundle-*.tar.gz
          if-no-files-found: ignore

      - name: Archive sdk tar artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdk-artifact-${{ inputs.machine_name }}
          path: sdk/panta*.sh
          if-no-files-found: ignore

      - name: Upload to S3
        run: |
          .github/scripts/upload.sh \
           ${{ secrets.AWS_ACCESS_KEY_ID }} \
           ${{ secrets.AWS_SECRET_ACCESS_KEY }} \
           ${{ secrets.AWS_S3_BUCKET }} \
           ${{ github.ref_name }} \
           ${{ inputs.machine_name }} \

