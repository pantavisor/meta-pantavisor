name: "schedule: pvtests"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build-docker-x86_64-scarthgap:
    uses: ./.github/workflows/buildkas-target.yaml
    with:
      configs: .github/configs/release/docker-x86_64-scarthgap.yaml:.github/configs/shared-vols.yaml
      machine_name: docker-x86_64-scarthgap
      build_target: pantavisor-appengine-distro
      output: pantavisor-appengine-distro-*.tar.gz
      sdk: 0
    secrets: inherit

  pvtests-local:
    needs: build-docker-x86_64-scarthgap
    uses: ./.github/workflows/call-pvtests.yaml
    with:
      test_type: pvtests-local
    secrets: inherit

  pvtests-remote-1:
    needs: [build-docker-x86_64-scarthgap, pvtests-local]
    if: always()
    uses: ./.github/workflows/call-pvtests.yaml
    with:
      test_type: pvtests-remote
    secrets: inherit

  pvtests-remote-2:
    needs: pvtests-remote-1
    if: needs.pvtests-remote-1.result == 'failure'
    uses: ./.github/workflows/call-pvtests.yaml
    with:
      test_type: pvtests-remote
    secrets: inherit

  pvtests-remote-3:
    needs: [pvtests-remote-1, pvtests-remote-2]
    if: needs.pvtests-remote-1.result == 'failure' && needs.pvtests-remote-2.result == 'failure'
    uses: ./.github/workflows/call-pvtests.yaml
    with:
      test_type: pvtests-remote
    secrets: inherit
