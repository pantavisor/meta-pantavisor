name: "ontag: generate changelog and release notes"

# Runs after the tag build (tag-scarthgap.yaml) completes. Reads the just-
# updated releases.json from S3, runs make-changelog.sh in historical mode
# to render the section for the tag, then:
#   1. Opens a PR back to master with the updated CHANGELOG/CHANGELOG-<MAJOR>.md
#   2. Creates (or updates) the GitHub Release for the tag with the section
#      as its body.
#
# The build artifacts are no longer attached to GitHub Releases — they live on
# S3 and the changelog Downloads table links to them. The release page is
# documentation only.
#
# Manual re-run via workflow_dispatch is supported for cases where S3 wasn't
# yet populated when the workflow first fired.

on:
  workflow_run:
    workflows: ["ontag: make release, build all targets"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate changelog for (e.g. 028-rc8)"
        required: true

jobs:
  changelog:
    name: "changelog (${{ github.event.inputs.tag || github.event.workflow_run.head_branch }})"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, '0'))
    permissions:
      contents: write
      pull-requests: write
    env:
      TAG: ${{ github.event.inputs.tag || github.event.workflow_run.head_branch }}
    steps:
      - name: Validate tag and derive major
        run: |
          if [[ ! "$TAG" =~ ^0[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match release pattern (0NN or 0NN-rcN)."
            exit 1
          fi
          MAJOR="${TAG%%-*}"
          echo "MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "Tag:   $TAG"
          echo "Major: $MAJOR"

      - name: Checkout master with full history
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PANTAVISOR_TAG_SYNC_TOKEN }}

      - name: Generate changelog file (historical mode)
        run: |
          # The tag exists by the time this fires, so make-changelog.sh runs in
          # historical mode: writes CHANGELOG/CHANGELOG-<MAJOR>.md but does not
          # auto-commit (the PR action handles the commit).
          ./.github/scripts/make-changelog.sh "$TAG"

      - name: Render release-notes section to a file
        run: |
          ./.github/scripts/make-changelog.sh --stdout "$TAG" > /tmp/release-notes.md
          echo "----- release-notes.md (head) -----"
          head -20 /tmp/release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating notes."
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --notes-file /tmp/release-notes.md
          else
            echo "Release $TAG does not exist — creating with notes."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Open PR with updated CHANGELOG
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PANTAVISOR_TAG_SYNC_TOKEN }}
          base: master
          branch: changelog/${{ env.TAG }}
          delete-branch: true
          add-paths: CHANGELOG/CHANGELOG-${{ env.MAJOR }}.md
          commit-message: "changelogs(${{ env.TAG }}): autoadd changelog"
          title: "changelogs(${{ env.TAG }}): autoadd changelog"
          body: |
            Auto-generated CHANGELOG section for `${{ env.TAG }}`.

            Generated by `.github/workflows/tag-changelogs.yaml` after the
            tag build completed. Contains downloads, component-version diff,
            and categorized changes since the previous tag in the stream.

            Release page: https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG }}
